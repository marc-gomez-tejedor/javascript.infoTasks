<script>
function sumToLoop(n) { 
    let sum = 0;
    for (let i = 0; i <= n; i++) {
        sum += i;
    }
    return sum;
}

function sumToRecursive(n) { 
    return n == 1 ? n : n + sumToRecursive(n - 1);
}
function sumToArithmetic(n) { 
    return n * (n + 1) / 2;
}
alert( sumToLoop(1001) ); // 5050
alert( sumToRecursive(1001) ); // 5050
alert( sumToArithmetic(1001) ); // 5050
</script>
