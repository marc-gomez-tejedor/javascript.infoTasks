<script>
function printNumbersInterval(from, to) {
  let current = from;

  let timerId = setInterval(function() {
    alert(current);
    if (current == to) {
      clearInterval(timerId);
    }
    current++;
  }, 1000);
}

function printNumbersTimeout(from, to) {
  let current = from;

  setTimeout( function go() {
    alert(current);
    if (current < to) {
      setTimeout(go, 1000);
    }
    current++;
  }, 1000);
}
printNumbersInterval(0, 3);
printNumbersTimeout(0, 3);
</script>
